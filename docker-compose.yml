  services:
    user-db:
      image: postgres:15
      container_name: user-db
      environment:
        POSTGRES_DB: userdb
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: password
      ports:
        - "5431:5432"
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres"]
        interval: 5s
        timeout: 5s
        retries: 5

    user-service:
      build:
        context: .
        dockerfile: user-service/Dockerfile
      ports:
        - "3001:3001"
      environment:
        DATABASE_URL: postgres://postgres:password@user-db:5432/userdb?sslmode=disable
      depends_on:
        user-db:
          condition: service_healthy

    menu-db:
      image: postgres:15
      container_name: menu-db
      environment:
        POSTGRES_DB: menudb
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: password
      ports:
        - "5433:5432"
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres"]
        interval: 5s
        timeout: 5s
        retries: 5

    menu-service:
      build:
        context: .
        dockerfile: menu-service/Dockerfile
      ports:
        - "3002:3002"
      environment:
        DATABASE_URL: postgres://postgres:password@menu-db:5432/menudb?sslmode=disable
      depends_on:
        menu-db:
          condition: service_healthy

    cart-db:
      image: postgres:15
      container_name: cart-db
      environment:
        POSTGRES_DB: cartdb
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: password
      ports:
        - "5434:5432"
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres"]
        interval: 5s
        timeout: 5s
        retries: 5

    cart-service:
      build:
        context: .
        dockerfile: cart-service/Dockerfile
      ports:
        - "3005:3005"
      environment:
        DATABASE_URL: postgres://postgres:password@cart-db:5432/cartdb?sslmode=disable
      depends_on:
        cart-db:
          condition: service_healthy

    auth-db:
      image: postgres:15
      container_name: auth-db
      environment:
        POSTGRES_DB: authdb
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: password
      ports:
        - "5435:5432"
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres"]
        interval: 5s
        timeout: 5s
        retries: 5

    auth-service:
      build:
        context: .
        dockerfile: auth-service/Dockerfile
      ports:
        - "3006:3006"
      environment:
        DATABASE_URL: postgres://postgres:password@auth-db:5432/authdb?sslmode=disable
        JWT_SECRET: super-secret-jwt-key
      depends_on:
        auth-db:
          condition: service_healthy

    payment-db:
      image: postgres:15
      container_name: payment-db
      environment:
        POSTGRES_DB: paymentdb
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: password
      ports:
        - "5436:5432"
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres"]
        interval: 5s
        timeout: 5s
        retries: 5

    payment-service:
      build:
        context: .
        dockerfile: payment-service/Dockerfile
      ports:
        - "3004:3004"
      environment:
        DATABASE_URL: postgres://postgres:password@payment-db:5432/paymentdb?sslmode=disable
      depends_on:
        payment-db:
          condition: service_healthy
        order-service:
          condition: service_started

    order-db:
      image: postgres:15
      container_name: order-db
      environment:
        POSTGRES_DB: orderdb
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: password
      ports:
        - "5437:5432"
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres"]
        interval: 5s
        timeout: 5s
        retries: 5

    order-service:
      build:
        context: .
        dockerfile: order-service/Dockerfile
      ports:
        - "3003:3003"
      environment:
        DATABASE_URL: postgres://postgres:password@order-db:5432/orderdb?sslmode=disable
      depends_on:
        order-db:
          condition: service_healthy