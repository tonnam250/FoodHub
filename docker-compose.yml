version: "3.9"

services:
  user-service:
    build: ./user-service
    ports:
      - "3001:3001"

  menu-service:
    build: ./menu-service
    ports:
      - "3002:3002"

  order-service:
    build: ./order-service
    ports:
      - "3003:3003"

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - menu-service
      - order-service